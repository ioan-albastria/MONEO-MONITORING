<div class="admin-section">
  <div class="admin-section__header">
    <h2 class="admin-section__title">Users</h2>
    <button class="btn btn-sm"
      [class.btn-primary]="!showCreateForm"
      [class.btn-ghost]="showCreateForm"
      (click)="showCreateForm = !showCreateForm">
      <span class="icon">{{ showCreateForm ? 'close' : 'add' }}</span>
      {{ showCreateForm ? 'Cancel' : 'New User' }}
    </button>
  </div>

  <div *ngIf="showCreateForm" class="admin-create-form">
    <div class="form-row--inline">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" [(ngModel)]="createUsername" placeholder="username">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" [(ngModel)]="createEmail" placeholder="user@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" [(ngModel)]="createPassword" placeholder="Password">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-select" [(ngModel)]="createRole">
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary"
        (click)="createUser()"
        [disabled]="creating || !createUsername.trim() || !createEmail.trim() || !createPassword">
        {{ creating ? 'Creating…' : 'Create' }}
      </button>
    </div>
  </div>

  <div *ngIf="error" class="admin-alert admin-alert--error">{{ error }}</div>
  <div *ngIf="loading" class="admin-state">Loading…</div>

  <table *ngIf="!loading" class="admin-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Active</th>
        <th>Created</th>
        <th>New password</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows; trackBy: trackUser">
        <td class="mono">{{ row.id }}</td>
        <td>
          <input class="form-input form-input--inline"
                 [(ngModel)]="row.editUsername"
                 [disabled]="isCurrentUser(row)"
                 (ngModelChange)="markDirty(row)">
          <span *ngIf="isCurrentUser(row)" class="badge badge--you">(you)</span>
        </td>
        <td>
          <input class="form-input form-input--inline"
                 type="email"
                 [(ngModel)]="row.editEmail"
                 (ngModelChange)="markDirty(row)">
        </td>
        <td>
          <select class="form-select form-select--sm"
                  [(ngModel)]="row.editRole"
                  [disabled]="isCurrentUser(row) || row.saving"
                  (ngModelChange)="markDirty(row)">
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </td>
        <td>
          <input type="checkbox"
                 [(ngModel)]="row.editIsActive"
                 [disabled]="isCurrentUser(row)"
                 (ngModelChange)="markDirty(row)">
        </td>
        <td class="text-fg-muted" style="font-size:0.8rem">{{ row.created_at | date:'dd MMM yyyy' }}</td>
        <td>
          <input class="form-input form-input--inline"
                 type="password"
                 [(ngModel)]="row.editPassword"
                 placeholder="Leave blank to keep"
                 (ngModelChange)="markDirty(row)">
        </td>
        <td style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm"
                  [disabled]="!row.dirty || row.saving"
                  (click)="saveRow(row)">
            {{ row.saving ? '…' : 'Save' }}
          </button>
          <button class="btn btn-danger btn-sm"
                  [disabled]="isCurrentUser(row)"
                  (click)="deleteRow(row)">
            Del
          </button>
          <span *ngIf="row.saveError" class="save-error">{{ row.saveError }}</span>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && !rows.length" class="admin-state">No users found.</div>
</div>
