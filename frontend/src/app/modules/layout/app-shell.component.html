<div class="flex flex-col min-h-dvh bg-surface-0 text-fg font-sans">
  <app-page-header
    [title]="pageTitle"
    [subtitle]="pageSubtitle"
    [stats]="pageStats"
    [userName]="userName"
    (toggleTheme)="ui.toggleTheme()"
    (toggleDensity)="ui.toggleDensity()"
    (logout)="logout()"
  ></app-page-header>

  <div class="flex-1 min-h-0 flex">
    <app-nav-rail></app-nav-rail>
    <main class="flex-1 min-w-0 p-[var(--page-pad)] overflow-auto">
      <app-alert-banner></app-alert-banner>
      <router-outlet></router-outlet>
    </main>
  </div>
  <app-toast-host></app-toast-host>

  <!-- Kiosk mode indicator — fades after 10 s -->
  <div
    *ngIf="kioskService.showBadge$ | async"
    class="kiosk-badge"
    aria-label="Kiosk mode active"
  >
    KIOSK
  </div>
</div>
