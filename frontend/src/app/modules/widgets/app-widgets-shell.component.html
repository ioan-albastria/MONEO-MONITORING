<section
  class="group relative h-full w-full overflow-hidden
         rounded-[var(--radius-xl)]
         border border-border bg-surface-2/65 backdrop-blur-md
         shadow-[var(--shadow-lev-1)]
         transition ease-[var(--ease-out)] duration-[var(--dur-2)]
         hover:shadow-[var(--shadow-lev-2)]
         focus-within:ring-1 focus-within:ring-[color-mix(in_oklch,var(--color-brand)_35%,transparent)]
         focus-within:border-[color-mix(in_oklch,var(--color-brand)_25%,var(--color-border))]
         flex flex-col"
  [attr.data-chrome]="chromeMode"
  [attr.data-tone]="tone"
  [style.--tone-tint]="toneTint"
  [style.--tone-edge]="toneEdge"
  [style.--tone-text]="toneText"
  [style.border-color]="toneEdge"
>

  <!-- Tone bar -->
  <div
    class="tone-bar absolute left-0 top-3 bottom-3 w-[2px] rounded-full opacity-70
            bg-[var(--tone-color)]"
    [attr.data-tone]="tone"
  ></div>

  <!-- Header / drag handle -->
  <header
    class="dashboard-widget-drag-handle shrink-0
           px-[var(--pad-widget-current)]
           pt-[calc(var(--pad-widget-current)*0.85)]
           pb-[calc(var(--pad-widget-current)*0.65)]
           bg-surface-1/45
           border-b border-border/45
           min-h-[52px]
           cursor-grab active:cursor-grabbing"
  >
    <div class="flex items-start gap-3">
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2">
          <h3 class="min-w-0 truncate text-sm font-medium text-fg">{{ title }}</h3>
          <ng-content select="[widgetBadge]"></ng-content>
        </div>
        <p *ngIf="subtitle" class="mt-0.5 text-xs text-fg-muted truncate">{{ subtitle }}</p>
      </div>
      <div class="gridster-item-content flex items-center gap-1">
        <ng-content select="[widgetActions]"></ng-content>
        <button
          type="button"
          class="h-7 w-7 rounded-[var(--radius-md)]
                 grid place-items-center
                 hover:bg-surface-3/25 transition"
          [attr.aria-label]="'Widget controls: ' + chromeMode"
          (click)="cycleChromeMode()"
          title="Toggle widget controls"
        >
          <span
            class="icon"
            [class.icon-muted]="chromeMode === 'off'"
            [class.icon-soft]="chromeMode !== 'off'"
          >nest_wifi_router</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Body -->
  <div
    class="widget-body flex-1 min-h-0
           px-[var(--pad-widget-current)]
           py-[var(--pad-widget-current)]"
  >
    <ng-content></ng-content>
  </div>

  <!-- Freshness footer -->
  <footer
    *ngIf="freshAt !== null"
    class="widget-freshness shrink-0"
    [attr.data-state]="freshnessState"
  >{{ freshAt | relativeTime }}</footer>

  <!-- Chrome bar (hover overlay) -->
  <div class="widget-chrome-bar absolute left-3 right-3 bottom-3 z-20">
    <div
      class="flex items-center justify-between gap-2
             rounded-[var(--radius-lg)]
             border border-border/70
             bg-surface-1/70 backdrop-blur-md
             px-2 py-0.5
             shadow-[var(--shadow-lev-0)]
             opacity-0 translate-y-1
             group-hover:opacity-100 group-hover:translate-y-0
             focus-within:opacity-100 focus-within:translate-y-0
             transition ease-[var(--ease-out)] duration-[var(--dur-2)]"
    >
      <div class="text-xs text-fg-faint truncate">
        <ng-content select="[widgetMeta]"></ng-content>
      </div>
      <div class="gridster-item-content flex items-center gap-1">
        <ng-content select="[widgetChrome]"></ng-content>
        <button type="button" class="icon-btn" title="Hide controls" (click)="chromeMode = 'off'">
          <span class="icon icon-muted">visibility_off</span>
        </button>
      </div>
    </div>
  </div>

</section>
